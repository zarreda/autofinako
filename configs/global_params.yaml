# ─────────────────────────────────────────────────────────────────────────────
# Earnings Prediction Research Platform — Global Parameters
# Edit this file to change any aspect of the pipeline without touching Python.
# ─────────────────────────────────────────────────────────────────────────────

# ── LLM configuration ────────────────────────────────────────────────────────
# Which model to use for scoring earnings call transcripts.
# Examples: "gpt-5.4-nano", "gpt-4.1", "claude-sonnet-4-20250514",
#           "qwen3.5:35b-a3b" (ollama), "deepseek-chat"
llm_model: "gpt-5.4-nano"

# Inference endpoint URL.
# Examples: "https://api.openai.com/v1" (OpenAI cloud),
#           "http://localhost:11434/v1" (ollama local),
#           "http://127.0.0.1:1234/v1" (LM Studio local),
#           "https://api.deepseek.com" (DeepSeek)
llm_base_url: "https://api.openai.com/v1"

# OpenAI API key. Can also be set via OPENAI_API_KEY env var (takes precedence).
# Never commit a real key here — use env var or .env file in production.
openai_api_key: ""

# Enable chain-of-thought reasoning. Adds /think prefix to prompts.
# Better quality, ~3x slower. Recommended for final scoring runs.
# Examples: false (fast, default), true (chain-of-thought)
llm_think_mode: false

# Sampling temperature. Lower = more deterministic, higher = more creative.
# Examples: 0.0 (greedy), 0.1 (near-deterministic), 0.7 (balanced), 1.0 (high variance)
llm_temperature: 0.1

# Max concurrent LLM requests (parallel workers per scoring stage).
# Examples: 4 (laptop), 8 (default), 16 (powerful server), 32 (max)
llm_max_workers: 8

# Whether the LLM provider supports native JSON schema response_format.
# true for OpenAI GPT-5.4-nano, GPT-4.1+; false for local models (ollama, LM Studio).
llm_supports_structured_output: true

# Maximum tokens in LLM response.
# Examples: 2048 (short answers), 4096 (default), 8192 (long reasoning)
llm_max_tokens: 4096

# ── Scoring prompt ────────────────────────────────────────────────────────────
# The prompt template sent to the LLM for each company/quarter.
# Required placeholders: {context} (earnings text), {target} (what to predict).
# The agent may override this in experiment.py. This is the human-authored baseline.
scoring_prompt: |
  You are a financial analyst evaluating earnings quality.

  Context:
  {context}

  Question: Based on the above, predict the {target} for next quarter.
  Respond with a single number between -1 (very negative) and +1 (very positive).
  Do not explain your reasoning.

# ── Scoring pipeline ──────────────────────────────────────────────────────────
# Number of sentences per transcript chunk sent to the LLM.
# Examples: 15 (fine-grained, more API calls), 30 (default), 50 (coarse, fewer calls)
chunk_size: 30

# Number of overlapping sentences between consecutive chunks.
# Examples: 0 (no overlap, default), 5 (some context carry-over), 10 (heavy overlap)
chunk_overlap: 0

# Enable entity neutering (replace names/orgs/dates with [TOKEN] placeholders).
# Reduces bias from entity recognition; requires spaCy.
# Examples: false (default), true (robustness testing)
neutering_enabled: false

# ── Enhanced scoring stages ───────────────────────────────────────────────────
# These stages layer rich annotations on top of the base 5-stage pipeline.
# Each can be toggled independently. Disabling stages speeds up scoring.

# Confidence-calibrated sentiment: adds confidence (1-5) and magnitude
# (strong/moderate/mild) to each sentence's sentiment label.
# Always recommended — minimal cost, high value.
run_enhanced_sentiment: true

# Quantitative guidance detection: identifies specific numbers, ranges, or
# percentages in management guidance ("revenue of $24-25B" vs "we expect growth").
# Produces guidance_density and avg_specificity features.
run_guidance: true

# Multi-horizon time tagging: classifies statements as PAST, CURRENT,
# NEAR_FUTURE (1-2 quarters), or FAR_FUTURE (3+ quarters).
# Produces near_future_frac, far_future_frac features.
run_horizon: true

# Speaker & section tagging: distinguishes prepared remarks vs Q&A responses,
# CEO vs CFO language, scripted vs spontaneous speech.
# Produces qa_vs_prepared_gap feature.
run_section: true

# Cross-quarter tone shift: compares management tone vs previous quarter.
# Requires prior-quarter data. Detects deterioration/improvement in outlook.
# Produces tone_shift_score feature.
run_tone_shift: true

# ── Target variable ───────────────────────────────────────────────────────────
# The variable the autoresearch loop optimises. This is the out-of-sample R²
# of the best model — higher means the model generalises better on unseen data.
# Examples: "oos_r_squared" (default), "eps_surprise_pct", "fwd_return_1m"
target_variable: "oos_r_squared"

# Whether higher values of target_variable are better.
# "higher_is_better" for R², IC, hit_rate; "lower_is_better" for RMSE, MAE.
target_direction: "higher_is_better"

# ── Feature engineering ───────────────────────────────────────────────────────
# Which feature groups to enable. Disabling groups speeds up iteration.
# Available: fundamentals, llm_scores, macro, sentiment, technical
feature_set:
  - fundamentals        # PE, revenue growth, margins, etc.
  - llm_scores          # LLM-generated scores (requires LLM to be running)
  - macro               # interest rates, sector ETF returns
  - sentiment           # earnings call tone, analyst revision direction
  # - technical         # price momentum, volume signals (optional)

# Winsorization quantiles for extreme value clipping.
# Examples: [0.01, 0.99] (1% tails, default), [0.05, 0.95] (5% tails)
winsorize_quantiles: [0.01, 0.99]

# ── Evaluation ────────────────────────────────────────────────────────────────
# Primary scalar metric used by autoresearch to decide keep vs. revert.
# Options: oos_r_squared (out-of-sample R²), ic (information coefficient),
#          icir (IC information ratio), hit_rate, sharpe
eval_metric: "oos_r_squared"

# Forward return horizon in calendar days.
# Examples: 30 (1 month), 60 (2 months), 90 (1 quarter)
eval_horizon_days: 30

# Fixed random seed for all stochastic operations (ensures reproducibility).
# Examples: 42, 123, 0
random_seed: 42

# ── Universe ──────────────────────────────────────────────────────────────────
# Polars filter expression applied to the raw universe.
# Use "True" to include everything.
# Examples: "market_cap_usd > 1e9 and avg_daily_volume_usd > 1e6",
#           "sector == 'Technology'", "True"
universe_filter: "True"

# Minimum quarters of earnings history required per ticker.
# Examples: 4 (lenient), 8 (default), 12 (strict)
min_history_quarters: 8

# ── Data splits ───────────────────────────────────────────────────────────────
# Year threshold for train/test split. Data before this year = train, after = test.
# Examples: 2022, 2023 (default), 2024
train_test_split_year: 2023

# Exclude fiscal years >= this value (partial/projected data).
# Examples: 2026 (exclude current partial year)
exclude_fyear_gte: 2026
